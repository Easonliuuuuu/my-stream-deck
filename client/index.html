<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>My Stream Deck</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b0d12" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="pin-screen">
    <h1>My Stream Deck</h1>
    <input id="server-input" placeholder="PC address (e.g. 192.168.1.20:8787)" autocapitalize="off" autocorrect="off" />
    <input id="pin-input" placeholder="Pairing token (or paste full pairing link)" autocapitalize="off" autocorrect="off" />
    <button id="pin-submit">Connect</button>
    <p id="pin-error"></p>
  </div>

  <div class="backdrop" hidden id="app-backdrop"></div>

  <div id="app" hidden>
    <div id="disconnected-banner" hidden>Disconnected — reconnecting…</div>

    <!-- Portrait: home grid + full-screen drill-in, shown when the phone is
         held upright. -->
    <div class="portrait-view">
      <div class="top">
        <span class="name">My Stream Deck</span>
        <span class="status" id="conn-status"><span class="dot"></span>Connected</span>
      </div>

      <div class="stack" id="stack" data-screen="home">
        <section class="screen home">
          <div class="now-strip">
            <div class="art art-sm"></div>
            <div class="now-text">
              <div class="track-title">—</div>
              <div class="track-artist">—</div>
            </div>
            <div class="keys transport">
              <button class="key" data-key="Prev">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
              </button>
              <button class="key primary" data-key="PlayPause">
                <svg class="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
              </button>
              <button class="key" data-key="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
              </button>
            </div>
          </div>

          <div class="volume-row">
            <button class="key" data-key="VolumeDown">−</button>
            <button class="key" data-key="Mute">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v6h4l5 4V5L7 9H3z"/><path d="M16 9l5 6M21 9l-5 6"/></svg>
            </button>
            <button class="key" data-key="VolumeUp">+</button>
          </div>

          <div class="app-grid" id="app-grid"></div>
        </section>

        <section class="screen detail" data-id="panel">
          <button class="back" data-nav="home">‹ Home</button>
          <p class="detail-title panel-title">—</p>
          <div class="panel-body"></div>
        </section>

        <section class="screen detail" data-id="settings">
          <button class="back" data-nav="home">‹ Home</button>
          <p class="detail-title">Settings</p>
          <div id="settings-portrait"></div>
        </section>
      </div>
    </div>

    <!-- Landscape: persistent info panel (now playing, CPU/GPU, active app)
         alongside a button grid that drills in without hiding the panel —
         meant for the phone docked sideways as a desk display. -->
    <div class="landscape-view">
      <div class="info-panel">
        <div class="now-card">
          <div class="art art-xs"></div>
          <div class="now-text">
            <div class="track-title">—</div>
            <div class="track-artist">—</div>
          </div>
          <div class="keys now-keys">
            <button class="key" data-key="Prev">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
            </button>
            <button class="key primary" data-key="PlayPause">
              <svg class="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </button>
            <button class="key" data-key="Next">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
            </button>
          </div>
        </div>

        <div class="system-card">
          <div class="sys-stat">
            <div class="sys-stat-top">
              <span class="stat-label">CPU</span>
              <span class="stat-value cpu cpu-val">—</span>
            </div>
            <div class="load-bar"><div class="load-fill cpu cpu-fill"></div></div>
          </div>
          <div class="sys-stat">
            <div class="sys-stat-top">
              <span class="stat-label">GPU</span>
              <span class="stat-value gpu gpu-val">—</span>
            </div>
            <div class="load-bar"><div class="load-fill gpu gpu-fill"></div></div>
          </div>
          <div class="sys-focus">
            <span class="k">Now Focused</span>
            <span class="v active-app">—</span>
          </div>
        </div>
      </div>

      <div class="grid-panel" data-screen="grid">
        <div class="grid-screen grid">
          <div class="tile-grid" id="tile-grid"></div>
        </div>

        <div class="grid-screen detail" data-id="settings">
          <div class="detail-inner">
            <button class="back-btn" data-nav="grid">‹ Grid</button>
            <p class="detail-title">Settings</p>
            <div id="settings-landscape"></div>
          </div>
        </div>

        <div class="grid-screen detail" data-id="panel">
          <div class="detail-inner">
            <button class="back-btn" data-nav="grid">‹ Grid</button>
            <p class="detail-title panel-title">—</p>
            <div class="panel-body"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="vendor/nosleep.min.js"></script>
<script src="app.js"></script>
</body>
</html>
